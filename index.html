<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Генератор Embed-iFrame для аудио/видео из облака</title>
  <style>
    input, select, textarea { width: 400px; max-width: 100%; margin-top: 10px;}
    label { display: block; margin-top: 15px; font-weight: bold; }
    button { margin-top: 10px; }
  </style>
</head>
<body>
  <h2>Генератор iframe для аудио/видео из облака</h2>
  <label>
    <span>Вид:</span>
    <select id="type">
      <option value="audio">Аудио</option>
      <option value="video">Видео</option>
    </select>
  </label>
  <label>
    <span>Прямая ссылка (mp3/mp4):</span>
    <input type="text" id="link" placeholder="https://....mp3"/>
  </label>
  <button onclick="getCode()">Получить embed-код</button>
  <textarea id="code" rows="4" readonly placeholder="Здесь появится код"></textarea>
  <script>
    function getCode() {
      const type = document.getElementById('type').value;
      const src = encodeURIComponent(document.getElementById('link').value.trim());
      if (!src || src === 'https://....mp3') {
        document.getElementById('code').value = 'Введите ссылку на файл!';
        return;
      }
      const url = `https://trualinka.github.io/audio-editor/embed.html?type=${type}&src=${src}`;
      let w = type === 'audio' ? 350 : 400;
      let h = type === 'audio' ? 60 : 300;
      document.getElementById('code').value = `<iframe src="${url}" width="${w}" height="${h}"></iframe>`;
    }
  </script>
</body>
</html>
